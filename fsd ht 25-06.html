<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Lost and Found Alert System</title>

    <style>
        *
        {
            margin: 0;
            padding:0;
            box-sizing: border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body
        {
            background: linear-gradient(135deg, #f5f7fa, #e4d7ff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container
        {
            width: 420px;
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h1
        {
            color: #3b2f63;
            margin-bottom: 10px;
        }
        p
        {
            color: #6b7280;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .input-group
        {
            margin-bottom: 20px;
            text-align: left;
        }
        label
        {
            display: block;
            margin-bottom: 6px;
            color: #374151;
            font-weight: 600;
        }
        input
        {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus
        {
            border-color: #8b5cf6;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.2);
        }
        button
        {
            width: 100%;
            padding: 12px;
            background-color: #8b5cf6;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        button:hover
        {
            background-color: #7c3aed;
            transform: translateY(-2px);
        }
        .footer
        {
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Campus Lost and Found Alert System</h1>
    <p>Register to receive notifications when lost items are found on campus</p>

    <form>
        <div class="input-group">
            <label for="name">Student Name:</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="input-group">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="input-group">
            <label for="item">Item Description:</label>
            <input type="text" id="item" name="item" required>
        </div>

        <div class="input-group">
            <label for="location">Location Found/Lost:</label>
            <input type="text" id="location" name="location" required>
        </div>

        <div class="input-group">
            <label for="date">Date Found/Lost:</label>
            <input type="date" id="date" name="date" required>
        </div>

        <button type="submit">Submit</button>
    </form>
    <div class="footer">© 2024 Campus Lost and Found Alert System. All rights reserved.</div>
</div>
</body>
</html>
