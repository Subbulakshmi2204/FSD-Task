<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donation Camp Registration</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: darkred;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: darkred;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: crimson;
        }

        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Blood Donation Registration</h2>

        <label for="name">Name:</label>
        <input type="text" id="name">

        <label for="email">Email:</label>
        <input type="email" id="email">

        <label for="phone">Phone:</label>
        <input type="tel" id="phone">

        <label for="age">Age:</label>
        <input type="number" id="age">

        <button id="donateBtn">Donate Now</button>

        <p id="message"></p>

    </div>

    <script>
        document.getElementById("donateBtn").addEventListener("click", function () {

            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let phone = document.getElementById("phone").value.trim();
            let age = document.getElementById("age").value.trim();

            let message = document.getElementById("message");

            // Name Validation
            if (name === "") {
                message.textContent = "Please enter your name.";
                message.style.color = "red";
                return;
            }

            // Email Validation
            if (email === "") {
                message.textContent = "Please enter your email.";
                message.style.color = "red";
                return;
            }

            // Phone Validation
            if (!/^\d{10}$/.test(phone)) {
                message.textContent = "Please enter a valid 10-digit phone number.";
                message.style.color = "red";
                return;
            }

            // Age Validation
            if (age === "") {
                message.textContent = "Please enter your age.";
                message.style.color = "red";
                return;
            }

            if (age < 18 || age > 65) {
                message.textContent = "Age must be between 18 and 65 years.";
                message.style.color = "red";
                return;
            }

            // Success Message
            message.textContent = "Registration Successful! Thank you for registering as a blood donor.";
            message.style.color = "green";
        });
    </script>

</body>
</html>
